<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moon Gun Sam — Beta Reader Feedback</title>

<style>

body {
  margin:0;
  background:#0B0F1A;
  color:#eee;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* header */
.header {
  text-align:center;
  padding:40px 20px 20px;
}

.header img {
  width:min(720px,90vw);
  opacity:.9;
}

/* container */
.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px 80px;
}

/* card */
.feedback-card {
  background:linear-gradient(180deg,#0d1425,#0a0e19);
  border-radius:16px;
  padding:40px;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* title */
.feedback-title {
  text-align:center;
  font-size:1.6rem;
  letter-spacing:.12em;
  margin-bottom:25px;
  opacity:.9;
}

/* form embed container */
.form-wrap {
  display:flex;
  justify-content:center;
}

/* back link */
.back-link {
  text-align:center;
  margin-top:30px;
}

.back-link a {
  color:#e6b14a;
  text-decoration:none;
}

.back-link a:hover {
  text-decoration:underline;
}

</style>
</head>


<body>

<div class="header">
<img src="/images/mgs-title.png" alt="Moon Gun Sam">
</div>


<div class="container">

<div class="feedback-card">

<div class="feedback-title">
Quick Feedback Form
</div>

<div class="form-wrap">

<script type="text/javascript" src="https://form.jotform.com/jsform/260636389582166"></script>

</div>

</div>

<div class="back-link">
<a href="/">← Return to Luna Dumu Press</a>
</div>

</div>

</body>
</html>
