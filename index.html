<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luna Dumu Press</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HERO -->
  <section class="hero fade">
    <div class="hero-content">
      <h1>LUNA DUMU PRESS</h1>
      <h2>Home of <span>Moon Gun Sam</span></h2>
      <p>A Book Series by Anthony Angel</p>
      <a class="cta" href="#books">Begin with The Dolphin</a>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about fade">
    <img src="images/logo.png" alt="Luna Dumu Press Logo" />
    <div>
      <h3>Our Mission</h3>
      <p>
        Luna Dumu Press publishes speculative fiction at the intersection of
        faith, violence, memory, and survival.
      </p>
    </div>
  </section>

  <!-- BOOKS -->
  <section id="books" class="books fade">
    <h3>Books Available</h3>
    <div class="book-grid">
      <img src="images/dolphin1.jpg" alt="The Dolphin Volume I" />
      <img src="images/dolphin2.jpg" alt="The Dolphin Volume II" />
    </div>
  </section>

  <footer>
    © 2025 Luna Dumu Press
  </footer>

  <script src="script.js"></script>
</body>
</html>
